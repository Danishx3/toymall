<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ToyMall</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <style>
        body {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 2rem;
            max-width: 400px;
            width: 100%;
            margin: 1rem;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header h2 {
            color: var(--primary);
            font-weight: 700;
        }
        .form-control {
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            padding: 0.75rem 1rem;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
        }
        .btn-login {
            background: var(--primary);
            border: none;
            border-radius: 10px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            width: 100%;
            margin-top: 1rem;
        }
        .btn-login:hover {
            background: var(--secondary);
        }
        .forgot-password {
            text-align: center;
            margin-top: 1rem;
        }
        .forgot-password a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
        }
        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
        .signup-link a {
            color: var(--primary);
            font-weight: 700;
        }
        .back-link {
            position: absolute;
            top: 1rem;
            left: 1rem;
            color: white;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link i {
            margin-right: 0.5rem;
        }
        .disabled-link {
            pointer-events: none;
            opacity: 0.6;
            cursor: not-allowed;
            text-decoration: none !important;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Shop</a>
    <div class="login-container">
        <div class="login-header">
            <h2>Welcome Back!</h2>
            <p>Login to start your toy adventure</p>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <label for="loginEmail" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="loginEmail" placeholder="your@email.com" required>
                <div class="invalid-feedback">Please enter a valid email address.</div>
            </div>
            <div class="mb-3">
                <label for="loginPass" class="form-label">Password</label>
                <input type="password" class="form-control" id="loginPass" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-login" id="loginBtn">
                <span id="btnText">Login Now</span>
                <span id="btnLoader" class="d-none"><i class="fas fa-circle-notch fa-spin"></i> Verifying...</span>
            </button>
        </form>
        <div id="loginMessage" class="alert d-none" style="margin-top: 1rem; border-radius: 10px; font-weight: 600; text-align: center;"></div>
        <div class="forgot-password">
            <a href="#" id="forgotPasswordLink">Forgot Password?</a>
        </div>
        <div class="signup-link">
            New explorer? <a href="#" onclick="openSignupModal()">Create an account</a>
        </div>
    </div>

    <!-- Signup Modal -->
    <div class="modal fade" id="signupModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Join the Kingdom</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="signupForm">
                        <div class="mb-3">
                            <label for="signupName" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="signupName" placeholder="Enter name" required>
                        </div>
                        <div class="mb-3">
                            <label for="signupEmail" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="signupEmail" placeholder="your@email.com" required>
                            <div class="invalid-feedback">Please enter a valid email address.</div>
                        </div>
                        <div class="mb-3">
                            <label for="signupPhone" class="form-label">WhatsApp Number</label>
                            <input type="tel" class="form-control" id="signupPhone" placeholder="Mobile for tracking" required>
                        </div>
                        <div class="mb-3">
                            <label for="signupPass" class="form-label">Create Password</label>
                            <input type="password" class="form-control" id="signupPass" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary" id="signupBtn" style="width:100%; padding:0.8rem; border-radius:12px; font-weight:700;">
                            <span id="signupBtnText">Sign Up & Explore</span>
                            <span id="signupBtnLoader" class="d-none"><i class="fas fa-magic fa-spin"></i> Creating Account...</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script src="js/secrets.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/catalog-meta.js"></script>
    <script>
        // Email validation
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        // Login form
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            const msg = document.getElementById('loginMessage');

            if (!validateEmail(email)) {
                document.getElementById('loginEmail').classList.add('is-invalid');
                return;
            } else {
                document.getElementById('loginEmail').classList.remove('is-invalid');
            }

            // Start Loading
            btn.disabled = true;
            btnText.classList.add('d-none');
            btnLoader.classList.remove('d-none');
            msg.className = 'alert d-none'; // reset

            try {
                await firebase.auth().signInWithEmailAndPassword(email, pass);
                
                // Success
                msg.textContent = 'Login Success! Redirecting...';
                msg.className = 'alert alert-success d-block text-success';
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } catch (err) {
                // Failure
                console.error(err);
                msg.textContent = 'Login Failed. Please check your credentials.';
                msg.className = 'alert alert-danger d-block text-danger';
                
                // End Loading
                btn.disabled = false;
                btnText.classList.remove('d-none');
                btnLoader.classList.add('d-none');
            }
        });

        // Signup form
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const phone = document.getElementById('signupPhone').value;
            const pass = document.getElementById('signupPass').value;
            const btn = document.getElementById('signupBtn');
            const btnText = document.getElementById('signupBtnText');
            const btnLoader = document.getElementById('signupBtnLoader');

            if (!validateEmail(email)) {
                document.getElementById('signupEmail').classList.add('is-invalid');
                return;
            } else {
                document.getElementById('signupEmail').classList.remove('is-invalid');
            }

            // Start Loading
            btn.disabled = true;
            if(btnText) btnText.classList.add('d-none');
            if(btnLoader) btnLoader.classList.remove('d-none');

            try {
                const res = await firebase.auth().createUserWithEmailAndPassword(email, pass);
                await firebase.database().ref("users/" + res.user.uid).set({ 
                    name, email, phone, role: 'customer', createdAt: new Date().toISOString() 
                });
                
                // Hide modal and wait briefly for auth observer to catch up
                const sm = document.getElementById('signupModal');
                const inst = bootstrap.Modal.getInstance(sm);
                if (inst) inst.hide();
                window.location.href = 'index.html';
            } catch (err) {
                console.error(err);
                alert('Signup Failed: ' + (err.code === 'auth/email-already-in-use' ? 'Email is already taken.' : 'Please follow password requirements.'));
                
                // End Loading
                btn.disabled = false;
                if(btnText) btnText.classList.remove('d-none');
                if(btnLoader) btnLoader.classList.add('d-none');
            }
        });

        // Forgot password
        document.getElementById('forgotPasswordLink').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const link = document.getElementById('forgotPasswordLink');
            const msg = document.getElementById('loginMessage');

            if (!email || !validateEmail(email)) {
                document.getElementById('loginEmail').classList.add('is-invalid');
                msg.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i> Please enter your email address first.';
                msg.className = 'alert alert-warning d-block text-warning';
                return;
            } else {
                document.getElementById('loginEmail').classList.remove('is-invalid');
            }

            // Start Loading
            const originalHTML = link.innerHTML;
            link.innerHTML = '<i class="fas fa-circle-notch fa-spin me-2"></i>Sending...';
            link.classList.add('disabled-link');
            
            msg.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Just a moment, sending link...';
            msg.className = 'alert alert-info d-block text-info';

            try {
                await firebase.auth().sendPasswordResetEmail(email);
                
                // Success message as requested
                msg.innerHTML = '<i class="fas fa-check-circle me-2"></i> link sented to your email spam section';
                msg.className = 'alert alert-success d-block text-success';
                
                // Restore link
                link.innerHTML = originalHTML;
                link.classList.remove('disabled-link');
            } catch (err) {
                console.error(err);
                msg.textContent = (err.code === 'auth/user-not-found') ? 'No account found with this email.' : 'Failed to send reset email. Try again.';
                msg.className = 'alert alert-danger d-block text-danger';
                
                // Restore link
                link.innerHTML = originalHTML;
                link.classList.remove('disabled-link');
            }
        });

        function openSignupModal() {
            new bootstrap.Modal(document.getElementById('signupModal')).show();
        }

        // Check if already logged in
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
